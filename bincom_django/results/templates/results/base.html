<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{% block title %}Bincom Election Results{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body { background:#f5f6fa; }
  .navbar-brand { font-weight:600; }
  .card { border:none; box-shadow:0 1px 4px rgba(0,0,0,.08); }
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="{% url 'pu_result' %}">Bincom Election Results</a>
    <div class="navbar-nav">
      <a class="nav-link" href="{% url 'pu_result' %}">Q1: Polling Unit Result</a>
      <a class="nav-link" href="{% url 'lga_result' %}">Q2: LGA Summed Result</a>
      <a class="nav-link" href="{% url 'add_pu_result' %}">Q3: Add New PU Result</a>
    </div>
  </div>
</nav>
<div class="container pb-5">
  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
  {% endif %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
